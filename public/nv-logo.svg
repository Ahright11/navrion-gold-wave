<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 42" fill="none">
  <!-- NEW VISION text -->
  <text x="0" y="32" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="32" fill="#1B5FAE" letter-spacing="2">NEW VISION</text>

  <!-- NV Diamond emblem -->
  <g transform="translate(258, 21)">
    <!-- Diamond outline -->
    <rect x="-16" y="-16" width="32" height="32" rx="2" transform="rotate(0)" fill="#1B5FAE" />
    <!-- X cross pattern (white) -->
    <line x1="-16" y1="-16" x2="16" y2="16" stroke="white" stroke-width="2.5"/>
    <line x1="16" y1="-16" x2="-16" y2="16" stroke="white" stroke-width="2.5"/>
    <!-- Center white diamond -->
    <rect x="-7" y="-7" width="14" height="14" transform="rotate(45)" fill="white"/>
    <!-- N and V letters -->
    <text x="-7" y="5" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="13" fill="#1B5FAE">N</text>
    <text x="1" y="5" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="13" fill="#1B5FAE">V</text>
  </g>

  <!-- SHIPPING text -->
  <text x="290" y="32" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="32" fill="#1B5FAE" letter-spacing="2">SHIPPING</text>
</svg>
