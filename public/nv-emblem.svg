<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Blue square background -->
  <rect width="100" height="100" fill="#1B5FAE"/>

  <!-- White top and bottom triangles -->
  <polygon points="0,0 100,0 50,50" fill="white"/>
  <polygon points="0,100 100,100 50,50" fill="white"/>

  <!-- Center white diamond (smaller) -->
  <polygon points="50,25 75,50 50,75 25,50" fill="white"/>

  <!-- N and V letters -->
  <text x="31" y="58" font-family="'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#1B5FAE" letter-spacing="1">N</text>
  <text x="53" y="58" font-family="'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#1B5FAE" letter-spacing="1">V</text>
</svg>
